name: ⬇️ 02 - Download from Magnet/Torrent

on:
  workflow_dispatch:
    inputs:
      magnet:
        description: 'Magnet link or torrent URL'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y transmission-cli zip curl unzip p7zip-full
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g peerflix

      - name: Download torrent
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MAGNET="${{ github.event.inputs.magnet }}"
          PASSWORD="${{ github.event.inputs.password }}"
          THRESHOLD_MB=90
          THRESHOLD_BYTES=$(( THRESHOLD_MB * 1024 * 1024 ))
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          mkdir -p downloads tmp_downloads

          download_torrent() {
            for attempt in 1 2; do
              echo "[$attempt/2] Downloading with transmission-cli..."
              timeout 7200 transmission-cli -d 0 -u 0 --download-dir tmp_downloads "$MAGNET" 2>&1 | grep -E "Progress:|Percent|Downloaded" || true
              if [ $? -eq 0 ] && [ "$(find tmp_downloads -type f ! -name '*.torrent' ! -name '*.part' | wc -l)" -gt 0 ]; then
                return 0
              fi
              echo "Retrying with peerflix..."
              timeout 7200 peerflix "$MAGNET" --download --path tmp_downloads 2>&1 | grep -E "downloading|progress" || true
              [ "$(find tmp_downloads -type f ! -name '*.torrent' | wc -l)" -gt 0 ] && return 0
              sleep 10
            done
            return 1
          }

          process_file() {
            local FILE="$1"
            local NAME=$(basename "$FILE" | sed 's/\.[^.]*$//')
            local FOLDER="$NAME"
            local COUNTER=1
            while [ -d "downloads/$FOLDER" ]; do FOLDER="${NAME}_$COUNTER"; COUNTER=$((COUNTER+1)); done
            mkdir -p "downloads/$FOLDER"
            
            local SIZE=$(stat -c%s "$FILE")
            if [ "$SIZE" -gt "$THRESHOLD_BYTES" ]; then
              echo "Splitting $NAME (${SIZE} bytes)"
              local TEMP_ZIP="downloads/$FOLDER/temp.zip"
              [ -n "$PASSWORD" ] && zip -j -P "$PASSWORD" "$TEMP_ZIP" "$FILE" || zip -j "$TEMP_ZIP" "$FILE"
              [ -n "$PASSWORD" ] && zip -s "${THRESHOLD_MB}m" -P "$PASSWORD" "downloads/$FOLDER/${NAME}.zip" "$TEMP_ZIP" || zip -s "${THRESHOLD_MB}m" "downloads/$FOLDER/${NAME}.zip" "$TEMP_ZIP"
              rm -f "$TEMP_ZIP"
            else
              [ -n "$PASSWORD" ] && zip -j -P "$PASSWORD" "downloads/$FOLDER/${NAME}.zip" "$FILE" || zip -j "downloads/$FOLDER/${NAME}.zip" "$FILE"
            fi
            
            echo "# $NAME" > "downloads/$FOLDER/README.md"
            echo "" >> "downloads/$FOLDER/README.md"
            echo "| File | Link |" >> "downloads/$FOLDER/README.md"
            echo "|------|------|" >> "downloads/$FOLDER/README.md"
            for PART in downloads/$FOLDER/${NAME}.zip*; do
              [ -f "$PART" ] && echo "| \`$(basename "$PART")\` | [Download](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER}/$(basename "$PART" | sed 's/ /%20/g')) |" >> "downloads/$FOLDER/README.md"
            done
            echo "" >> "downloads/$FOLDER/README.md"
            echo "Magnet: \`$MAGNET\`" >> "downloads/$FOLDER/README.md"
          }

          echo "Starting download..."
          if download_torrent; then
            echo "Download completed!"
            find tmp_downloads -type f \( -name "*.torrent" -o -name "*.part" -o -name "*.resume" \) -delete
            
            if [ "$MODE" = "zip" ]; then
              ARCHIVE="torrent_$(date +%Y%m%d_%H%M%S)"
              mkdir -p "downloads/$ARCHIVE"
              tar -cf "/tmp/$ARCHIVE.tar" -C tmp_downloads .
              process_file "/tmp/$ARCHIVE.tar"
              rm -f "/tmp/$ARCHIVE.tar"
            else
              find tmp_downloads -type f | while read -r f; do process_file "$f"; done
              find tmp_downloads -mindepth 1 -maxdepth 1 -type d | while read -r d; do
                TAR="/tmp/$(basename "$d").tar"
                tar -cf "$TAR" -C "$d" .
                process_file "$TAR"
                rm -f "$TAR"
              done
            fi
            rm -rf tmp_downloads
          else
            echo "Download failed!"
            exit 1
          fi

      - name: Update README
        run: |
          MAGNET="${{ github.event.inputs.magnet }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          
          {
            echo "# Torrent Downloads"
            echo "Magnet: \`$MAGNET\`"
            echo ""
            echo "## Files"
            find downloads -mindepth 1 -maxdepth 1 -type d | while read -r d; do
              echo "- [$(basename "$d")]($REPO_URL/$(basename "$d" | sed 's/ /%20/g'))"
            done
          } > downloads/README.md
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md downloads/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "[AVASAM] Add torrent downloads [skip ci]"
          
          mapfile -t FILES < <(git ls-files --others --modified --exclude-standard downloads/ 2>/dev/null)
          for i in "${!FILES[@]}"; do
            [ $((i % 5)) -eq 0 ] && [ $i -ne 0 ] && git push origin HEAD:"${GITHUB_REF_NAME}" && sleep 2
            git add "${FILES[$i]}"
          done
          git push origin HEAD:"${GITHUB_REF_NAME}"
