name: ⬇️ 02 - Download from Magnet/Torrent

on:
  workflow_dispatch:
    inputs:
      magnet:
        description: 'Magnet link or torrent URL'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2, zip, and torrent tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl unzip p7zip-full
          # Install peerflix for torrent streaming (lightweight)
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g peerflix

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Torrent Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download from magnet/torrent
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MAGNET="${{ github.event.inputs.magnet }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          echo "AVASAM (https://avasam.ir) - Downloading torrent with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (automatic)"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads torrent_cache

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          create_error_file() {
            local FOLDER_NAME="$1"
            local ERROR_MSG="$2"
            local MAGNET="$3"
            mkdir -p "downloads/$FOLDER_NAME"
            {
              echo "# Torrent Download - Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **Magnet/Torrent** | \`${MAGNET}\` |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Possible Solutions"
              echo ""
              echo "- Check if the magnet link is valid"
              echo "- The torrent may have no seeders"
              echo "- Try a different torrent client or source"
              echo "- Some torrents may be blocked"
              echo "- Increase timeout or retry later"
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } > "downloads/$FOLDER_NAME/README.md"
            echo "Error file created: downloads/$FOLDER_NAME/README.md"
          }

          download_torrent() {
            local MAGNET="$1"
            local MAX_RETRIES=2
            local RETRY_DELAY=10
            local SUCCESS=false
            local ERROR_LOG=""

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for torrent"
              
              # Try using aria2c for torrent download
              echo "Using aria2c for torrent download..."
              ERROR_LOG=$(timeout 7200 aria2c \
                --seed-time=0 \
                --max-connection-per-server=16 \
                --split=16 \
                --min-split-size=1M \
                --max-overall-upload-limit=1K \
                --bt-max-peers=50 \
                --bt-request-peer-speed-limit=10M \
                --follow-torrent=true \
                --dir="tmp_downloads" \
                "$MAGNET" 2>&1) && SUCCESS=true && break
              
              echo "aria2c failed, trying peerflix fallback..."
              
              # Fallback to peerflix for streaming download
              ERROR_LOG=$(timeout 7200 peerflix "$MAGNET" --download --path "tmp_downloads" 2>&1) && SUCCESS=true && break
              
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            done

            if [ "$SUCCESS" = true ]; then
              # Check if we have any downloaded files
              FILE_COUNT=$(find tmp_downloads -type f ! -name "*.aria2" ! -name "*.torrent" 2>/dev/null | wc -l)
              if [ "$FILE_COUNT" -gt 0 ]; then
                echo "Successfully downloaded torrent: $FILE_COUNT files"
                return 0
              else
                rm -rf tmp_downloads/*
                create_error_file "torrent_failed" "No files were downloaded. Torrent may have no seeders or invalid content." "$MAGNET"
                return 1
              fi
            else
              create_error_file "torrent_failed" "$ERROR_LOG" "$MAGNET"
              return 1
            fi
          }

          split_and_compress() {
            local INPUT_FILE="$1"
            local OUTPUT_DIR="$2"
            local BASENAME="$3"
            local PASSWORD="$4"
            local THRESHOLD_MB="$5"
            
            local FILE_SIZE=$(stat -c%s "$INPUT_FILE")
            local FILE_SIZE_MB=$(( FILE_SIZE / 1024 / 1024 ))
            
            echo "Processing: $BASENAME (${FILE_SIZE_MB} MB)"
            
            if [ "$FILE_SIZE" -gt "$THRESHOLD_BYTES" ]; then
              echo "File exceeds ${THRESHOLD_MB}MB - splitting into parts"
              
              # Create a temporary zip first
              local TEMP_ZIP="${OUTPUT_DIR}/temp_${BASENAME}.zip"
              if [ -n "$PASSWORD" ]; then
                zip -j -P "$PASSWORD" "$TEMP_ZIP" "$INPUT_FILE"
              else
                zip -j "$TEMP_ZIP" "$INPUT_FILE"
              fi
              
              # Split the zip file
              if [ -n "$PASSWORD" ]; then
                zip -s "${THRESHOLD_MB}m" -P "$PASSWORD" "${OUTPUT_DIR}/${BASENAME}.zip" "$TEMP_ZIP"
              else
                zip -s "${THRESHOLD_MB}m" "${OUTPUT_DIR}/${BASENAME}.zip" "$TEMP_ZIP"
              fi
              
              # Clean up
              rm -f "$TEMP_ZIP"
              
              # Rename split files to have consistent naming
              if [ -f "${OUTPUT_DIR}/${BASENAME}.z01" ]; then
                mv "${OUTPUT_DIR}/${BASENAME}.z01" "${OUTPUT_DIR}/${BASENAME}.zip.001"
              fi
              if [ -f "${OUTPUT_DIR}/${BASENAME}.z02" ]; then
                mv "${OUTPUT_DIR}/${BASENAME}.z02" "${OUTPUT_DIR}/${BASENAME}.zip.002"
              fi
              
              echo "Created split parts in ${OUTPUT_DIR}/"
            else
              # Small file - just zip it
              if [ -n "$PASSWORD" ]; then
                zip -j -P "$PASSWORD" "${OUTPUT_DIR}/${BASENAME}.zip" "$INPUT_FILE"
              else
                zip -j "${OUTPUT_DIR}/${BASENAME}.zip" "$INPUT_FILE"
              fi
            fi
          }

          # Download torrent
          echo "Downloading torrent from: $MAGNET"
          download_torrent "$MAGNET" || echo "Failed to download torrent"

          # Remove .aria2 temp files and .torrent files
          find tmp_downloads -type f \( -name "*.aria2" -o -name "*.torrent" \) -delete

          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="torrent_archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "downloads" "$ARCHIVE_NAME")
              mkdir -p "downloads/$FOLDER_NAME"
              echo "Creating split archive in folder: downloads/$FOLDER_NAME"
              
              # Create a single archive of all downloaded content
              TEMP_TAR="/tmp/${ARCHIVE_NAME}.tar"
              cd tmp_downloads
              tar -cf "$TEMP_TAR" .
              cd ..
              
              # Now split and compress the tar file
              split_and_compress "$TEMP_TAR" "downloads/$FOLDER_NAME" "$ARCHIVE_NAME" "$ZIP_PASSWORD" "$SPLIT_THRESHOLD_MB"
              
              rm -f "$TEMP_TAR"
              
              # Count parts
              PARTS_COUNT=$(ls downloads/${FOLDER_NAME}/${ARCHIVE_NAME}.zip* 2>/dev/null | wc -l)
              
              # Create README.md for zip mode
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')
              
              {
                echo "# ${ARCHIVE_NAME} - Torrent Archive"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Archive Name** | \`${ARCHIVE_NAME}.zip\` |"
                echo "| **Parts** | ${PARTS_COUNT} |"
                echo "| **Status** | **Complete (100%)** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo ""
                echo "---"
                echo ""
                echo "## Download Links"
                echo ""
                echo "| File | Link |"
                echo "|------|------|"
              } > "downloads/$FOLDER_NAME/README.md"
              
              for part_file in downloads/${FOLDER_NAME}/${ARCHIVE_NAME}.zip*; do
                if [ -f "$part_file" ]; then
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                  echo "| \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |" >> "downloads/$FOLDER_NAME/README.md"
                fi
              done
              
              {
                echo ""
                echo "---"
                echo ""
                echo "## How to Reassemble"
                echo ""
                echo "**Linux/Mac:**"
                echo "\`\`\`bash"
                echo "# Download all parts to the same directory"
                echo "# Then run:"
                echo "cat ${ARCHIVE_NAME}.zip.* > ${ARCHIVE_NAME}.zip"
                echo "unzip ${ARCHIVE_NAME}.zip"
                echo "\`\`\`"
                echo ""
                echo "**Windows:**"
                echo "Download all parts, then use 7-Zip to extract the first part (.zip.001)"
                echo ""
                echo "---"
                echo ""
                echo "## Original Magnet Link"
                echo ""
                echo "\`\`\`"
                echo "$MAGNET"
                echo "\`\`\`"
                echo ""
                echo "---"
                echo ""
                echo "*This tool created by [avasam.ir](https://avasam.ir)*"
              } >> "downloads/$FOLDER_NAME/README.md"
            fi
            rm -rf tmp_downloads
          else
            # Normal mode - process each file individually
            find tmp_downloads -type f ! -name "*.aria2" ! -name "*.torrent" | while read -r FILE; do
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              FOLDER_NAME=$(get_unique_folder "downloads" "$BASENAME_NO_EXT")
              mkdir -p "downloads/$FOLDER_NAME"
              
              split_and_compress "$FILE" "downloads/$FOLDER_NAME" "$BASENAME_NO_EXT" "$ZIP_PASSWORD" "$SPLIT_THRESHOLD_MB"
              
              # Create README for this item
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')
              PARTS_COUNT=$(ls downloads/${FOLDER_NAME}/${BASENAME_NO_EXT}.zip* 2>/dev/null | wc -l)
              
              {
                echo "# ${BASENAME} - Torrent Download"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Original File** | \`${BASENAME}\` |"
                echo "| **Parts** | ${PARTS_COUNT} |"
                echo "| **Status** | **Complete (100%)** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo ""
                echo "---"
                echo ""
                echo "## Download Links"
                echo ""
                echo "| File | Link |"
                echo "|------|------|"
              } > "downloads/${FOLDER_NAME}/README.md"
              
              for part_file in downloads/${FOLDER_NAME}/${BASENAME_NO_EXT}.zip*; do
                if [ -f "$part_file" ]; then
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                  echo "| \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |" >> "downloads/${FOLDER_NAME}/README.md"
                fi
              done
              
              {
                echo ""
                echo "---"
                echo ""
                echo "## Original Magnet Link"
                echo ""
                echo "\`\`\`"
                echo "$MAGNET"
                echo "\`\`\`"
                echo ""
                echo "---"
                echo ""
                echo "*This tool created by [avasam.ir](https://avasam.ir)*"
              } >> "downloads/${FOLDER_NAME}/README.md"
            done
            
            # Handle directories in normal mode
            find tmp_downloads -mindepth 1 -maxdepth 1 -type d | while read -r DIR; do
              DIRNAME=$(basename "$DIR")
              FOLDER_NAME=$(get_unique_folder "downloads" "$DIRNAME")
              mkdir -p "downloads/$FOLDER_NAME"
              
              # Create tar of directory then split
              TEMP_TAR="/tmp/${DIRNAME}.tar"
              cd "$DIR"
              tar -cf "$TEMP_TAR" .
              cd ../..
              
              split_and_compress "$TEMP_TAR" "downloads/$FOLDER_NAME" "$DIRNAME" "$ZIP_PASSWORD" "$SPLIT_THRESHOLD_MB"
              rm -f "$TEMP_TAR"
              
              # Create README
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')
              PARTS_COUNT=$(ls downloads/${FOLDER_NAME}/${DIRNAME}.zip* 2>/dev/null | wc -l)
              
              {
                echo "# ${DIRNAME} - Torrent Download"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Original Directory** | \`${DIRNAME}\` |"
                echo "| **Parts** | ${PARTS_COUNT} |"
                echo "| **Status** | **Complete (100%)** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo ""
                echo "---"
                echo ""
                echo "## Download Links"
                echo ""
                echo "| File | Link |"
                echo "|------|------|"
              } > "downloads/${FOLDER_NAME}/README.md"
              
              for part_file in downloads/${FOLDER_NAME}/${DIRNAME}.zip*; do
                if [ -f "$part_file" ]; then
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                  echo "| \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |" >> "downloads/${FOLDER_NAME}/README.md"
                fi
              done
              
              {
                echo ""
                echo "---"
                echo ""
                echo "## Original Magnet Link"
                echo ""
                echo "\`\`\`"
                echo "$MAGNET"
                echo "\`\`\`"
                echo ""
                echo "---"
                echo ""
                echo "*This tool created by [avasam.ir](https://avasam.ir)*"
              } >> "downloads/${FOLDER_NAME}/README.md"
            done
            
            rm -rf tmp_downloads
          fi

      - name: Update README.md with download links
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          MAGNET="${{ github.event.inputs.magnet }}"

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)

          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi

          # Create README.md inside downloads folder
          {
            echo "# Downloaded Torrent Files"
            echo ""
            echo "## Original Magnet Link"
            echo "\`\`\`"
            echo "$MAGNET"
            echo "\`\`\`"
            echo ""
            echo "## Downloaded Content"
            echo ""
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(echo "${FOLDER}" | sed 's/ /%20/g')
                echo "- [${FOLDER}](./${FOLDER_ENCODED})"
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > "downloads/README.md"

          echo "downloads/README.md created"

          # Update root README.md
          SECTION_TITLE="فایل های دانلود شده از تورنت در گیتهاب شما :"

          if [ ! -f "README.md" ]; then
            echo "# AVASAM Torrent Downloader" > README.md
            echo "" >> README.md
            echo "https://avasam.ir" >> README.md
            echo "" >> README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                echo "${COUNTER}. [$FOLDER]($REPO_URL/$FOLDER)"
                echo ""
                COUNTER=$((COUNTER + 1))
              fi
            done
            echo "---"
          } >> README.md

          echo "README.md updated"

      - name: Commit & Push in batches of 5 files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "AVASAM (https://avasam.ir) - Preparing to commit torrent files"

          git add README.md
          git add downloads/README.md
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "[AVASAM] Update README.md [skip ci]"
              git push origin HEAD:"$BRANCH"
            fi
            echo "Nothing else to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "Pushing batch $BATCH_NUM: files $((i+1)) to $(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            if [ "$BATCH_NUM" -eq 1 ]; then
              git add README.md
              git add downloads/README.md
            fi

            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "[AVASAM] Add torrent downloaded files - batch $BATCH_NUM [skip ci]"
              git pull --rebase origin "$BRANCH"
              git push origin HEAD:"$BRANCH"
              echo "Batch $BATCH_NUM pushed"
            else
              echo "Batch $BATCH_NUM skipped - no new changes"
            fi
          done

          echo "All $TOTAL files pushed in $BATCH_NUM batch(es) - AVASAM (https://avasam.ir)"
