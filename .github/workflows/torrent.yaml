              if [[ "$ITEM_NAME" == *.torrent ]]; then
                continue
              fi
              
              # Create unique folder name
              BASENAME_NO_EXT="${ITEM_NAME%.*}"
              FOLDER_NAME="$BASENAME_NO_EXT"
              COUNTER=1
              while [ -d "splitted_downloads/$FOLDER_NAME" ]; do
                FOLDER_NAME="${BASENAME_NO_EXT}_${COUNTER}"
                COUNTER=$((COUNTER + 1))
              done
              
              mkdir -p "splitted_downloads/$FOLDER_NAME"
              
              if [ -d "$ITEM" ]; then
                # Directory - zip the whole folder
                echo "Zipping directory: $ITEM_NAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -r -s "$SPLIT_SIZE" -P "$ZIP_PASSWORD" "splitted_downloads/$FOLDER_NAME/${ITEM_NAME}.zip" "$ITEM" > /dev/null 2>&1
                else
                  zip -r -s "$SPLIT_SIZE" "splitted_downloads/$FOLDER_NAME/${ITEM_NAME}.zip" "$ITEM" > /dev/null 2>&1
                fi
              else
                # Single file
                FILE_SIZE=$(stat -c%s "$ITEM")
                FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
                
                echo "Processing $ITEM_NAME (${FILE_SIZE_MB} MB)"
                
                if [ "$FILE_SIZE" -gt 94371840 ]; then  # 90MB in bytes
                  echo "File exceeds 90MB - splitting into parts"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    zip -j -s "$SPLIT_SIZE" -P "$ZIP_PASSWORD" "splitted_downloads/$FOLDER_NAME/${ITEM_NAME}.zip" "$ITEM" > /dev/null 2>&1
                  else
                    zip -j -s "$SPLIT_SIZE" "splitted_downloads/$FOLDER_NAME/${ITEM_NAME}.zip" "$ITEM" > /dev/null 2>&1
                  fi
                else
                  echo "File under 90MB - creating single zip"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    zip -j -P "$ZIP_PASSWORD" "splitted_downloads/$FOLDER_NAME/${ITEM_NAME}.zip" "$ITEM" > /dev/null 2>&1
                  else
                    zip -j "splitted_downloads/$FOLDER_NAME/${ITEM_NAME}.zip" "$ITEM" > /dev/null 2>&1
                  fi
                fi
              fi
              
