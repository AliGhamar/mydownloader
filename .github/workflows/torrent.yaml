      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          echo "Committing files to repository..."
          
          # Add all files
          git add README.md 2>/dev/null || true
          git add splitted_downloads/ 2>/dev/null || true
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            MAGNET_SHORT="${{ github.event.inputs.magnet_link }}"
            MAGNET_SHORT="${MAGNET_SHORT:0:60}"
            
            git commit -m "[AVASAM] Download torrent: ${MAGNET_SHORT} [skip ci]"
            
            # Pull and push
            git pull --rebase origin "$BRANCH" || true
            git push origin HEAD:"$BRANCH"
            
            echo "✅ Successfully pushed to GitHub"
          fi
