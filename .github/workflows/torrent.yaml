            echo "Created: splitted_downloads/$FOLDER_NAME with $PART_COUNT part(s)"
          done

      - name: Create index page
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/splitted_downloads"
          
          # Create main README for downloads folder
