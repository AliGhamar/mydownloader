          fi

      - name: Commit and push to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add README.md splitted_downloads/ 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            SHORT_HASH=$(echo "${{ github.event.inputs.magnet_link }}" | grep -o 'btih:[a-zA-Z0-9]*' | cut -d':' -f2 | head -1 | cut -c1-8)
            if [ -z "$SHORT_HASH" ]; then
              SHORT_HASH="torrent"
            fi
            
            git commit -m "[AVASAM] Download torrent: ${SHORT_HASH} [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" --no-edit || true
            git push origin HEAD:"${GITHUB_REF_NAME}"
            
            echo "Successfully committed and pushed to GitHub"
          fi
