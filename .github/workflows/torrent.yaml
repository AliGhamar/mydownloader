EOF
          
          # List all download folders
          if [ -d "splitted_downloads" ]; then
            echo "| Download | Parts | Size |" >> splitted_downloads/README.md
            echo "|----------|-------|------|" >> splitted_downloads/README.md
            
            for FOLDER in splitted_downloads/*/; do
              if [ -d "$FOLDER" ] && [ -f "${FOLDER}README.md" ]; then
                FOLDER_NAME=$(basename "$FOLDER")
                # Skip error folders
                if [[ "$FOLDER_NAME" == failed_* ]]; then
                  continue
                fi
                
                # Extract info from README
                PARTS=$(grep "Parts Created" "${FOLDER}README.md" | grep -o '[0-9]*' | head -1)
                SIZE=$(grep "Original Size" "${FOLDER}README.md" | grep -o '[0-9]*' | head -1)
                FOLDER_ENCODED=$(echo "$FOLDER_NAME" | sed 's/ /%20/g')
                
                echo "| [$FOLDER_NAME]($REPO_URL/$FOLDER_ENCODED) | ${PARTS:-?} | ${SIZE:-?} MB |" >> splitted_downloads/README.md
              fi
            done
          fi
          
          cat >> splitted_downloads/README.md << 'EOF'

---

## How to Use

1. Click on any download folder above
2. Download all parts to the same directory
3. Follow the reassembly instructions in the folder's README

