name: ⬇️ 01- Download from Torrent Magnet Link

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link (magnet:?xt=urn:btih:...)'
        required: true
        type: string
      select_files:
        description: 'Specific files to download (comma-separated names, leave empty for all)'
        required: false
        default: ''
        type: string
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-torrent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip unzip curl

      - name: AVASAM Torrent Downloader
        run: |
          echo "🏷️ AVASAM - Torrent Download Solution"
          echo "🌐 https://avasam.ir"
          echo "⚠️ Files larger than 90MB will be split into parts"

      - name: Download torrent with aria2
        run: |
          MAGNET="${{ github.event.inputs.magnet_link }}"
          PASSWORD="${{ github.event.inputs.password }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          mkdir -p torrent_download splitted_downloads
          
          # Extract torrent hash for identification
          HASH=$(echo "$MAGNET" | grep -o 'btih:[a-zA-Z0-9]*' | cut -d':' -f2 | head -1)
          if [ -z "$HASH" ]; then
            HASH=$(echo "$MAGNET" | grep -o 'urn:btih:[a-zA-Z0-9]*' | cut -d':' -f3 | head -1)
          fi
          if [ -z "$HASH" ]; then
            HASH="unknown_$(date +%s)"
          fi
          
          echo "Torrent hash: $HASH"
          
          # Download using aria2 with BitTorrent support
          aria2c \
            --enable-dht=true \
            --enable-peer-exchange=true \
            --bt-enable-lpd=true \
            --bt-tracker-interval=30 \
            --bt-stop-timeout=0 \
            --seed-time=0 \
            --seed-ratio=0.0 \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --max-concurrent-downloads=5 \
            --max-overall-upload-limit=1K \
            --download-limit=0 \
            --timeout=60 \
            --connect-timeout=60 \
            --max-tries=10 \
            --retry-wait=10 \
            --max-file-not-found=10 \
            --continue=true \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            --bt-save-metadata=true \
            --bt-metadata-only=false \
            --follow-torrent=true \
            --dir="torrent_download" \
            "$MAGNET" 2>&1 | tee download.log
          
          # List downloaded files
          echo "Download completed. Contents:"
          ls -la torrent_download/
          
          # Remove .torrent metadata files if they exist
          find torrent_download -name "*.torrent" -type f -delete
          
          # Count actual files
          FILE_COUNT=$(find torrent_download -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: No files downloaded. Torrent may have no seeders."
            
            # Create error report
            mkdir -p "splitted_downloads/failed_${HASH}_$(date +%Y%m%d_%H%M%S)"
            cat > "splitted_downloads/failed_${HASH}_$(date +%Y%m%d_%H%M%S)/README.md" << EOF
# Torrent Download Failed

## Error Information

The torrent could not be downloaded. Common reasons:

1. **No seeders** - The torrent has no active seeders
2. **Invalid magnet link** - The magnet link format is incorrect
3. **Network restrictions** - GitHub Actions may block P2P traffic
4. **Timeout** - Download exceeded available time

## Magnet Link Provided

\`\`\`
$MAGNET
\`\`\`

## Download Log

\`\`\`
$(tail -50 download.log 2>/dev/null || echo "No log available")
\`\`\`

## Suggestions

- Verify the magnet link works in qBittorrent or Transmission locally
- Try again later when more seeders are available
- Use a dedicated server with persistent storage for torrents

*This tool created by [avasam.ir](https://avasam.ir)*
EOF
            exit 0
          fi
          
          echo "Successfully downloaded $FILE_COUNT file(s)"
          
          # Calculate total size
          TOTAL_SIZE=$(du -sb torrent_download | cut -f1)
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "Total size: ${TOTAL_SIZE_MB} MB"
          
          if [ "$TOTAL_SIZE" -gt 500000000 ]; then
            echo "WARNING: Downloaded content is ${TOTAL_SIZE_MB} MB which exceeds GitHub's recommended limits"
          fi
          
          # Process each downloaded file
          for FILE in torrent_download/*; do
            if [ ! -f "$FILE" ]; then
              continue
            fi
            
            FILENAME=$(basename "$FILE")
            SIZE=$(stat -c%s "$FILE")
            SIZE_MB=$((SIZE / 1024 / 1024))
            BASENAME="${FILENAME%.*}"
            
            # Create unique folder name
            FOLDER_NAME="$BASENAME"
            COUNTER=1
            while [ -d "splitted_downloads/$FOLDER_NAME" ]; do
              FOLDER_NAME="${BASENAME}_${COUNTER}"
              COUNTER=$((COUNTER + 1))
            done
            mkdir -p "splitted_downloads/$FOLDER_NAME"
            
            echo "Processing: $FILENAME (${SIZE_MB} MB)"
            
            # Split into 90MB parts if needed
            SPLIT_THRESHOLD=94371840  # 90MB in bytes
            if [ "$SIZE" -gt "$SPLIT_THRESHOLD" ]; then
              echo "File exceeds 90MB - splitting into parts"
              if [ -n "$PASSWORD" ]; then
                zip -j -s 90m -P "$PASSWORD" "splitted_downloads/$FOLDER_NAME/${FILENAME}.zip" "$FILE" > /dev/null 2>&1
              else
                zip -j -s 90m "splitted_downloads/$FOLDER_NAME/${FILENAME}.zip" "$FILE" > /dev/null 2>&1
              fi
            else
              echo "File under 90MB - creating single zip"
              if [ -n "$PASSWORD" ]; then
                zip -j -P "$PASSWORD" "splitted_downloads/$FOLDER_NAME/${FILENAME}.zip" "$FILE" > /dev/null 2>&1
              else
                zip -j "splitted_downloads/$FOLDER_NAME/${FILENAME}.zip" "$FILE" > /dev/null 2>&1
              fi
            fi
            
            # Count zip parts
            PART_COUNT=$(find "splitted_downloads/$FOLDER_NAME" -type f \( -name "*.zip" -o -name "*.z*" \) | wc -l)
            
            # Generate README for this download
            cat > "splitted_downloads/$FOLDER_NAME/README.md" << EOF
# ${FILENAME} - Torrent Download

---

## File Information

| Property | Value |
|----------|-------|
| **Original Name** | \`${FILENAME}\` |
| **Original Size** | ${SIZE_MB} MB |
| **Torrent Hash** | \`${HASH}\` |
| **Parts Created** | ${PART_COUNT} |
| **Part Size Limit** | 90MB |
| **Download Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |
| **Password Protected** | $([ -n "$PASSWORD" ] && echo "YES" || echo "NO") |

---

## Download Links

$(for part in splitted_downloads/$FOLDER_NAME/*.{zip,z[0-9][0-9],z[0-9][0-9][0-9]} 2>/dev/null; do
  if [ -f "$part" ]; then
    PART_NAME=$(basename "$part")
    PART_ENCODED=$(echo "$PART_NAME" | sed 's/ /%20/g')
    LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/splitted_downloads/${FOLDER_NAME}/${PART_ENCODED}"
    echo "| \`${PART_NAME}\` | [Download](${LINK}) |"
  fi
done)

---

## How to Reassemble

### Option 1: On Linux/Mac
\`\`\`bash
# Download all parts to the same directory, then run:
cat ${FILENAME}.z* > combined.zip 2>/dev/null || cp ${FILENAME}.zip combined.zip
unzip combined.zip
$([ -n "$PASSWORD" ] && echo "# Enter the password when prompted" || echo "")
\`\`\`

### Option 2: On Windows
1. Download all parts to the same folder
2. Use 7-Zip to extract the .zip file
3. 7-Zip will automatically handle split archives

---

*This tool created by [avasam.ir](https://avasam.ir)*
