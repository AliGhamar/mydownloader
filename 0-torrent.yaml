name: ⬇️ 02 - Download from Magnet/Torrent

on:
  workflow_dispatch:
    inputs:
      magnet:
        description: 'Magnet link or torrent URL'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2, zip, and torrent tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl unzip
          # Install peerflix for torrent streaming (lightweight)
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g peerflix

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Torrent Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download from magnet/torrent
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MAGNET="${{ github.event.inputs.magnet }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          echo "AVASAM (https://avasam.ir) - Downloading torrent with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (automatic)"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads torrent_cache

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          get_unique_name() {
            local BASE_PATH="$1"
            local NAME="$2"
            local IS_DIR="$3"
            if [ "$IS_DIR" = "true" ]; then
              if [ ! -d "$BASE_PATH/$NAME" ]; then
                echo "$NAME"
                return
              fi
              local COUNTER=1
              while [ -d "$BASE_PATH/${NAME}_${COUNTER}" ]; do
                COUNTER=$((COUNTER + 1))
              done
              echo "${NAME}_${COUNTER}"
            else
              if [ ! -f "$BASE_PATH/$NAME" ]; then
                echo "$NAME"
                return
              fi
              local FILENAME="${NAME%.*}"
              local EXT="${NAME##*.}"
              if [ "$FILENAME" = "$NAME" ]; then
                EXT=""
              fi
              local COUNTER=1
              if [ -n "$EXT" ] && [ "$FILENAME" != "$EXT" ]; then
                while [ -f "$BASE_PATH/${FILENAME}_${COUNTER}.${EXT}" ]; do
                  COUNTER=$((COUNTER + 1))
                done
                echo "${FILENAME}_${COUNTER}.${EXT}"
              else
                while [ -f "$BASE_PATH/${NAME}_${COUNTER}" ]; do
                  COUNTER=$((COUNTER + 1))
                done
                echo "${NAME}_${COUNTER}"
              fi
            fi
          }

          create_error_file() {
            local FOLDER_NAME="$1"
            local ERROR_MSG="$2"
            local MAGNET="$3"
            mkdir -p "downloads/$FOLDER_NAME"
            {
              echo "# Torrent Download - Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **Magnet/Torrent** | \`${MAGNET}\` |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Possible Solutions"
              echo ""
              echo "- Check if the magnet link is valid"
              echo "- The torrent may have no seeders"
              echo "- Try a different torrent client or source"
              echo "- Some torrents may be blocked"
              echo "- Increase timeout or retry later"
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } > "downloads/$FOLDER_NAME/README.md"
            echo "Error file created: downloads/$FOLDER_NAME/README.md"
          }

          download_torrent() {
            local MAGNET="$1"
            local MAX_RETRIES=2
            local RETRY_DELAY=10
            local SUCCESS=false
            local ERROR_LOG=""

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for torrent"
              
              # Try using aria2c for torrent download
              echo "Using aria2c for torrent download..."
              ERROR_LOG=$(timeout 3600 aria2c \
                --seed-time=0 \
                --max-connection-per-server=16 \
                --split=16 \
                --min-split-size=1M \
                --max-overall-upload-limit=1K \
                --bt-max-peers=50 \
                --bt-request-peer-speed-limit=10M \
                --follow-torrent=true \
                --dir="tmp_downloads" \
                "$MAGNET" 2>&1) && SUCCESS=true && break
              
              echo "aria2c failed, trying peerflix fallback..."
              
              # Fallback to peerflix for streaming download
              local TORRENT_NAME=$(echo "$MAGNET" | md5sum | cut -d' ' -f1)
              ERROR_LOG=$(timeout 3600 peerflix "$MAGNET" --download --path "tmp_downloads" 2>&1) && SUCCESS=true && break
              
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            done

            if [ "$SUCCESS" = true ]; then
              # Check if we have any downloaded files
              FILE_COUNT=$(find tmp_downloads -type f ! -name "*.aria2" ! -name "*.torrent" 2>/dev/null | wc -l)
              if [ "$FILE_COUNT" -gt 0 ]; then
                echo "Successfully downloaded torrent: $FILE_COUNT files"
                return 0
              else
                rm -rf tmp_downloads/*
                create_error_file "torrent_failed" "No files were downloaded. Torrent may have no seeders or invalid content." "$MAGNET"
                return 1
              fi
            else
              create_error_file "torrent_failed" "$ERROR_LOG" "$MAGNET"
              return 1
            fi
          }

          # Download torrent
          echo "Downloading torrent from: $MAGNET"
          download_torrent "$MAGNET" || echo "Failed to download torrent"

          # Remove .aria2 temp files and .torrent files
          find tmp_downloads -type f \( -name "*.aria2" -o -name "*.torrent" \) -delete

          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="torrent_archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "downloads" "$ARCHIVE_NAME")
              mkdir -p "downloads/$FOLDER_NAME"
              echo "Creating zip archive in folder: downloads/$FOLDER_NAME"
              
              # Create zip of all downloaded content
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -r -P "$ZIP_PASSWORD" "downloads/$FOLDER_NAME/${ARCHIVE_NAME}.zip" tmp_downloads/*
              else
                zip -r "downloads/$FOLDER_NAME/${ARCHIVE_NAME}.zip" tmp_downloads/*
              fi

              # Create README.md for zip mode
              ZIP_SIZE=$(stat -c%s "downloads/$FOLDER_NAME/${ARCHIVE_NAME}.zip")
              ZIP_SIZE_MB=$(echo "scale=2; $ZIP_SIZE / 1024 / 1024" | bc)
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')
              FILE_ENCODED=$(echo "${ARCHIVE_NAME}.zip" | sed 's/ /%20/g')
              RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"

              {
                echo "# ${ARCHIVE_NAME} - Torrent Archive"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Archive Name** | \`${ARCHIVE_NAME}.zip\` |"
                echo "| **Size** | ${ZIP_SIZE_MB} MB |"
                echo "| **Status** | **Complete (100%)** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo ""
                echo "---"
                echo ""
                echo "## Download Link"
                echo ""
                echo "| File | Link |"
                echo "|------|------|"
                echo "| \`${ARCHIVE_NAME}.zip\` | [Download](${RAW_LINK}) |"
                echo ""
                echo "---"
                echo ""
                echo "## Original Magnet Link"
                echo ""
                echo "\`\`\`"
                echo "$MAGNET"
                echo "\`\`\`"
                echo ""
                echo "---"
                echo ""
                echo "*This tool created by [avasam.ir](https://avasam.ir)*"
              } > "downloads/$FOLDER_NAME/README.md"
            fi
            rm -rf tmp_downloads
          else
            # Process each downloaded file/directory
            find tmp_downloads -mindepth 1 -maxdepth 1 | while read -r ITEM; do
              BASENAME=$(basename "$ITEM")
              FOLDER_NAME=$(get_unique_folder "downloads" "$BASENAME")
              mkdir -p "downloads/$FOLDER_NAME"
              
              if [ -d "$ITEM" ]; then
                # Handle directory
                echo "Processing directory: $BASENAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -r -P "$ZIP_PASSWORD" "downloads/${FOLDER_NAME}/${BASENAME}.zip" "$ITEM"
                else
                  zip -r "downloads/${FOLDER_NAME}/${BASENAME}.zip" "$ITEM"
                fi
                
                # Check if zip needs splitting
                ZIP_SIZE=$(stat -c%s "downloads/${FOLDER_NAME}/${BASENAME}.zip")
                if [ "$ZIP_SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                  echo "Re-splitting ${BASENAME}.zip into ${SPLIT_THRESHOLD_MB}MB parts"
                  mv "downloads/${FOLDER_NAME}/${BASENAME}.zip" "downloads/${FOLDER_NAME}/temp.zip"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    zip -0 -s "${SPLIT_THRESHOLD_MB}m" -P "$ZIP_PASSWORD" "downloads/${FOLDER_NAME}/${BASENAME}.zip" "downloads/${FOLDER_NAME}/temp.zip"
                  else
                    zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${FOLDER_NAME}/${BASENAME}.zip" "downloads/${FOLDER_NAME}/temp.zip"
                  fi
                  rm -f "downloads/${FOLDER_NAME}/temp.zip"
                fi
              else
                # Handle single file
                SIZE=$(stat -c%s "$ITEM")
                echo "Processing file: $BASENAME (${SIZE} bytes)"
                
                if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                  echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting into ${SPLIT_THRESHOLD_MB}MB parts"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    zip -0 -s "${SPLIT_THRESHOLD_MB}m" -P "$ZIP_PASSWORD" "downloads/${FOLDER_NAME}/${BASENAME}.zip" -j "$ITEM"
                  else
                    zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${FOLDER_NAME}/${BASENAME}.zip" -j "$ITEM"
                  fi
                else
                  if [ -n "$ZIP_PASSWORD" ]; then
                    zip -j -P "$ZIP_PASSWORD" "downloads/${FOLDER_NAME}/${BASENAME}.zip" "$ITEM"
                  else
                    zip -j "downloads/${FOLDER_NAME}/${BASENAME}.zip" "$ITEM"
                  fi
                fi
              fi
              
              # Create README for this item
              FOLDER_ENCODED=$(echo "${FOLDER_NAME}" | sed 's/ /%20/g')
              PARTS_COUNT=$(ls downloads/${FOLDER_NAME}/*.z* downloads/${FOLDER_NAME}/*.zip 2>/dev/null | wc -l)
              
              {
                echo "# ${BASENAME} - Torrent Download"
                echo ""
                echo "---"
                echo ""
                echo "## Download Information"
                echo ""
                echo "| Property | Value |"
                echo "|----------|-------|"
                echo "| **Original Item** | \`${BASENAME}\` |"
                echo "| **Parts** | ${PARTS_COUNT} |"
                echo "| **Status** | **Complete (100%)** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "| **Password Protected** | **YES** |"
                else
                  echo "| **Password Protected** | **NO** |"
                fi
                echo ""
                echo "---"
                echo ""
                echo "## Download Links"
                echo ""
                echo "| File | Link |"
                echo "|------|------|"
              } > "downloads/${FOLDER_NAME}/README.md"
              
              for part_file in "downloads/${FOLDER_NAME}/${BASENAME}".z* "downloads/${FOLDER_NAME}/${BASENAME}.zip"; do
                if [ -f "$part_file" ]; then
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                  echo "| \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |" >> "downloads/${FOLDER_NAME}/README.md"
                fi
              done
              
              {
                echo ""
                echo "---"
                echo ""
                echo "## Original Magnet Link"
                echo ""
                echo "\`\`\`"
                echo "$MAGNET"
                echo "\`\`\`"
                echo ""
                echo "---"
                echo ""
                echo "*This tool created by [avasam.ir](https://avasam.ir)*"
              } >> "downloads/${FOLDER_NAME}/README.md"
            done
            rm -rf tmp_downloads
          fi

      - name: Update README.md with download links
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          MAGNET="${{ github.event.inputs.magnet }}"

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)

          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi

          # Create README.md inside downloads folder
          {
            echo "# Downloaded Torrent Files"
            echo ""
            echo "## Original Magnet Link"
            echo "\`\`\`"
            echo "$MAGNET"
            echo "\`\`\`"
            echo ""
            echo "## Downloaded Content"
            echo ""
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(echo "${FOLDER}" | sed 's/ /%20/g')
                echo "- [${FOLDER}](./${FOLDER_ENCODED})"
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > "downloads/README.md"

          echo "downloads/README.md created"

          # Update root README.md
          SECTION_TITLE="فایل های دانلود شده از تورنت در گیتهاب شما :"

          if [ ! -f "README.md" ]; then
            echo "# AVASAM Torrent Downloader" > README.md
            echo "" >> README.md
            echo "https://avasam.ir" >> README.md
            echo "" >> README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                echo "${COUNTER}. [$FOLDER]($REPO_URL/$FOLDER)"
                echo ""
                COUNTER=$((COUNTER + 1))
              fi
            done
            echo "---"
          } >> README.md

          echo "README.md updated"

      - name: Commit & Push in batches of 5 files (AVASAM)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "AVASAM (https://avasam.ir) - Preparing to commit torrent files"

          git add README.md
          git add downloads/README.md
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "[AVASAM] Update README.md [skip ci]"
              git push origin HEAD:"$BRANCH"
            fi
            echo "Nothing else to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "Pushing batch $BATCH_NUM: files $((i+1)) to $(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            if [ "$BATCH_NUM" -eq 1 ]; then
              git add README.md
              git add downloads/README.md
            fi

            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "[AVASAM] Add torrent downloaded files - batch $BATCH_NUM [skip ci]"
              git pull --rebase origin "$BRANCH"
              git push origin HEAD:"$BRANCH"
              echo "Batch $BATCH_NUM pushed"
            else
              echo "Batch $BATCH_NUM skipped - no new changes"
            fi
          done

          echo "All $TOTAL files pushed in $BATCH_NUM batch(es) - AVASAM (https://avasam.ir)"
